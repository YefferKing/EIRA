name: Rastreador de Modelos OpenCode

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  list_models:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar modelos disponibles
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const apiKey = `${{ secrets.OPENCODE_API_KEY }}`;
              
              // Llamamos al endpoint estándar de OpenAI para listar modelos
              const response = await fetch("https://opencode.ai/zen/go/v1/models", {
                method: "GET",
                headers: {
                  "Authorization": `Bearer ${apiKey}`,
                  "Content-Type": "application/json"
                }
              });

              if (!response.ok) {
                const errText = await response.text();
                throw new Error(`Status ${response.status}: ${errText}`);
              }

              const data = await response.json();
              
              // Mapeamos los IDs de los modelos encontrados
              const listaModelos = data.data.map(m => `- \`${m.id}\``).join("\n");
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### 📋 Modelos disponibles en tu OpenCode GO:\n\n${listaModelos}`
              });

            } catch (error) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ No se pudo obtener la lista de modelos.\n\n**Detalle:** ${error.message}`
              });
            }
