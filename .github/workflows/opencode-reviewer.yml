name: Revision con OpenCode GO

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR Agent con OpenCode GO
        uses: Codium-ai/pr-agent@main
        env:
          # Proveedor estándar compatible
          CONFIG.MODEL_PROVIDER: "openai"
          OPENAI.BASE_URL: "https://opencode.ai/zen/go/v1"
          
          # Corrección de la variable del Token (Formato global obligatorio)
          OPENAI_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Modelo y forzado de límites para evitar el error de MAX_TOKENS
          CONFIG.MODEL: "qwen-3.7-plus"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: 32000
          
          # Acciones automáticas al abrir el PR
          PR_DESCRIPTION.PUBLISH_DESCRIPTION_AS_COMMENT: true
          PR_CODE_SUGGESTIONS.NUM_CODE_SUGGESTIONS: 4
